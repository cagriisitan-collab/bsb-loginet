<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>BSB-LOGINET | Deck.gl Lojistik Ağı</title>
    <script src="https://unpkg.com/deck.gl@latest/dist.min.js"></script>
    <script src="https://unpkg.com/maplibre-gl@latest/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@latest/dist/maplibre-gl.css" rel="stylesheet" />
    <style>
        body { margin: 0; padding: 0; background: #000; }
        #map { width: 100vw; height: 100vh; }
    </style>
</head>
<body>
    <div id="map"></div>
    <script>
        // MapLibre + Deck.gl Entegrasyonu (Mapbox'ın ücretsiz ve açık kaynaklı ikizi)
        const map = new maplibregl.Map({
            container: 'map',
            style: 'https://basemaps.cartocdn.com/gl/dark-matter-gl-style/style.json',
            center: [36.0, 42.5],
            zoom: 6
        });

        const deck = new deck.DeckGL({
            container: 'map',
            map: map,
            layers: [
                new deck.ArcLayer({
                    id: 'rotalar',
                    data: [
                        { source: [36.33, 41.2867], target: [27.9147, 43.2141] }, // Samsun-Varna
                        { source: [36.33, 41.2867], target: [41.6367, 41.6168] }  // Samsun-Batum
                    ],
                    getSourcePosition: d => d.source,
                    getTargetPosition: d => d.target,
                    getSourceColor: [0, 210, 255],
                    getTargetColor: [255, 153, 0],
                    getWidth: 4
                })
            ]
        });
    </script>
</body>
</html>
