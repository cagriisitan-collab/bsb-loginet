<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BSB-LOGINET | Karadeniz Lojistik</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ol@v7.3.0/ol.css">
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; background-color: #f4f7f6; }
        .navbar { background-color: #003366; padding: 15px 20px; color: white; display: flex; gap: 20px; }
        .navbar a { color: white; text-decoration: none; font-weight: bold; }
        .content { padding: 20px; }
        .box { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        #map { height: 500px; width: 100%; margin-top: 15px; border: 1px solid #ccc; }
    </style>
</head>
<body>

    <div class="navbar">
        <a href="#">Ana Sayfa</a>
        <a href="#">Proje Hakkında</a>
        <a href="#">Ulaşım Haritaları</a>
    </div>

    <div class="content">
        <div class="box">
            <h2>Karadeniz Lojistik Ağı</h2>
            <p>Samsun, Varna ve Batum rotaları.</p>
            <div id="map"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/ol@v7.3.0/dist/ol.js"></script>
    <script>
        // Harita Başlatma
        const map = new ol.Map({
            target: 'map',
            layers: [
                new ol.layer.Tile({
                    source: new ol.source.OSM()
                })
            ],
            view: new ol.View({
                center: ol.proj.fromLonLat([36.0, 42.5]), // Samsun merkezi bazlı koordinat
                zoom: 6
            })
        });
    </script>
</body>
</html>
